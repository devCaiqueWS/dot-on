name: Deploy via FTP

# Dispara o deploy sempre que houver push na branch main.
# Você também pode rodar manualmente pela aba "Actions" (workflow_dispatch).
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Envia os arquivos PHP/HTML/CSS para o servidor via FTP.
      #    Projeto PHP não precisa de build: os arquivos vão como estão.
      - name: Deploy FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}       # ex: ftp.seusite.com.br
          username: ${{ secrets.FTP_USERNAME }}    # usuário do FTP
          password: ${{ secrets.FTP_PASSWORD }}    # senha do FTP
          port: 21                                 # 21 = FTP padrão / 990 = FTPS implícito
          protocol: ftp                            # use "ftps" se o servidor exigir conexão segura

          # Pasta local enviada = raiz do repositório
          local-dir: ./

          # Pasta de destino no servidor (onde o site fica hospedado)
          server-dir: /public_html/

          # Arquivos que NÃO devem ser enviados ao servidor.
          # Precisa ser uma string (um padrão por linha), NÃO uma lista YAML.
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            .env
            **/.env
            README.md
            *.md
