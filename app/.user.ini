; ============================================================
; DOT-ON · .user.ini específico
; Resolve problemas de open_basedir e ajusta limites
; ============================================================

; --- Limites de upload/POST (para envio de arquivos grandes do agente) ---
upload_max_filesize = 100M
post_max_size = 110M
memory_limit = 512M

; --- Tempo de execução (relatórios AFD/AEJ podem demorar) ---
max_execution_time = 300
max_input_time = 600
max_input_vars = 5000

; --- Logs ---
log_errors = On
display_errors = Off
display_startup_errors = Off

; --- Sessão ---
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1
session.cookie_samesite = "Lax"

; --- Timezone ---
date.timezone = "America/Sao_Paulo"

; --- Segurança ---
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; ============================================================
; NOTA IMPORTANTE sobre open_basedir
; ============================================================
; Em hospedagens compartilhadas, open_basedir é geralmente
; configurado no painel cPanel/Plesk pelo provedor, NÃO no .user.ini.
;
; Se ainda assim der "File not found" após este arquivo:
; 1. Acesse cPanel → "MultiPHP INI Editor" → escolha o domínio
; 2. Procure open_basedir
; 3. Adicione: /home/storage/SEU_PATH/public_html
; OU comente/remova completamente a restrição
; ============================================================
